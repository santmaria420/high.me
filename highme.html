<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>high.me — 匿名ストーナー通話</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.15);
    --green-border: rgba(74,222,128,0.35);
    --bg: #080808;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --text: #f0f0f0;
    --text-dim: rgba(240,240,240,0.45);
    --text-dimmer: rgba(240,240,240,0.2);
    --red: #ef4444;
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .screen {
    display: none;
    width: 100%;
    max-width: 420px;
    padding: 24px 20px;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    animation: fadeUp 0.35s ease forwards;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LOGO ── */
  .logo {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -3px;
    line-height: 1;
    color: #fff;
  }
  .logo span { color: var(--green); }
  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-align: center;
    margin-top: -16px;
  }

  /* ── ONLINE BADGE ── */
  .online-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg2);
  }
  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.75); }
  }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    padding: 18px 24px;
    border: none;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: -0.4px;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary { background: var(--green); color: #050505; }
  .btn-ghost {
    background: var(--bg2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 14px;
    padding: 14px 24px;
  }
  .btn-danger { background: var(--red); color: #fff; }

  .btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  /* ── CAMERA / VERIFY ── */
  .step-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--green);
    align-self: flex-start;
  }
  .step-title {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.15;
    align-self: flex-start;
  }

  .camera-zone {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 16px;
    border: 1.5px dashed var(--green-border);
    background: var(--green-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .camera-zone:hover { border-color: var(--green); background: rgba(74,222,128,0.2); }
  .camera-zone video, .camera-zone canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
  }
  .camera-icon { font-size: 40px; }
  .camera-hint {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.7;
  }
  .camera-overlay-btn {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--green);
    cursor: pointer;
    z-index: 2;
  }

  .notice {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
    text-align: center;
    line-height: 1.8;
  }

  /* ── MATCHING ── */
  .spinner-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .spinner {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.06);
    border-top: 1.5px solid var(--green);
    animation: spin 1.1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .match-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    text-align: center;
  }
  .match-sub {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ── CALL ── */
  #screen-call {
    padding: 0;
    max-width: 100%;
    height: 100dvh;
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    background: #000;
    z-index: 10;
  }
  #screen-call.active { display: flex; }

  #remoteVideo {
    flex: 1;
    width: 100%;
    object-fit: cover;
    background: #111;
  }
  #localVideo {
    position: absolute;
    width: 100px;
    aspect-ratio: 3/4;
    object-fit: cover;
    border-radius: 12px;
    bottom: 110px; right: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    z-index: 2;
    background: #222;
  }

  .call-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px 32px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 3;
  }

  .call-timer {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    z-index: 3;
  }

  .call-anon {
    position: absolute;
    top: 16px; left: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green);
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--green-border);
    border-radius: 100px;
    padding: 5px 12px;
    z-index: 3;
  }

  .circ-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: transform 0.12s, opacity 0.12s;
  }
  .circ-btn:active { transform: scale(0.9); }
  .btn-end   { background: var(--red); width: 64px; height: 64px; font-size: 24px; }
  .btn-next  { background: var(--green-dim); border: 1px solid var(--green-border); }
  .btn-mic   { background: rgba(255,255,255,0.1); border: 1px solid var(--border); }
  .btn-report { background: rgba(255,255,255,0.06); border: 1px solid var(--border); }

  /* ── REPORT SHEET ── */
  .sheet-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 20;
    align-items: flex-end;
    justify-content: center;
    padding: 20px;
  }
  .sheet-backdrop.open { display: flex; }
  .sheet {
    width: 100%;
    max-width: 420px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    animation: slideUp 0.25s ease forwards;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .sheet-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .report-opt {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .report-opt:hover { background: rgba(255,255,255,0.07); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── BACK BTN ── */
  .back-btn {
    align-self: flex-start;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--text); }

  /* ── CONNECTING STATUS ── */
  .status-chip {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }
  .status-chip.ok { color: var(--green); }
  .status-chip.err { color: var(--red); }
</style>
</head>
<body>
<div id="app">

  <!-- SCREEN: HOME -->
  <div id="screen-home" class="screen active">
    <div style="text-align:center;">
      <div class="logo">hi<span>gh</span>.me</div>
      <div class="tagline">anonymous · p2p · encrypted</div>
    </div>
    <div class="online-badge">
      <div class="pulse-dot"></div>
      <span id="onlineCount">接続中...</span>
    </div>
    <div style="width:100%;display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-primary" onclick="goVerify()">📸 確認してつなぐ</button>
      <button class="btn btn-ghost" onclick="showToast('カメラ確認 → マッチング → P2P通話。データ保存ゼロ。')">このアプリについて</button>
    </div>
    <p class="notice">完全匿名 · 警察への通報なし · 通話データ保存ゼロ<br>通報はコミュニティベースでセッション終了のみ</p>
    <div id="peerStatus" class="status-chip">シグナリング接続中...</div>
  </div>

  <!-- SCREEN: VERIFY (camera check) -->
  <div id="screen-verify" class="screen">
    <button class="back-btn" onclick="goHome()">← 戻る</button>
    <div class="step-label">STEP 01 / 02</div>
    <div class="step-title">今日の一品を<br>見せてくれ</div>

    <div class="camera-zone" id="cameraZone" onclick="capturePhoto()">
      <video id="verifyVideo" autoplay playsinline muted style="display:none;"></video>
      <canvas id="verifyCanvas" style="display:none;"></canvas>
      <div id="cameraPlaceholder" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div class="camera-icon">🌿</div>
        <div class="camera-hint">タップして撮影<br>端末内で処理・即削除</div>
      </div>
      <div id="retakeBtn" class="camera-overlay-btn" style="display:none;" onclick="retakePhoto(event)">撮り直す</div>
    </div>

    <button class="btn btn-primary" id="proceedBtn" style="display:none;" onclick="goMatch()">確認完了 → マッチング</button>
    <p class="notice">写真はサーバーに送信されません。<br>ブラウザ内のみで処理し、即時破棄します。</p>
  </div>

  <!-- SCREEN: MATCHING -->
  <div id="screen-match" class="screen">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div>
        <div class="match-title">マッチング中...</div>
        <div class="match-sub" id="matchSub" style="margin-top:8px;">ストーナーを探しています</div>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="cancelMatch()">キャンセル</button>
  </div>

  <!-- SCREEN: IN CALL (full screen) -->
  <div id="screen-call" class="screen">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo"  autoplay playsinline muted></video>
    <div class="call-anon">ANONYMOUS</div>
    <div class="call-timer" id="callTimer">00:00</div>
    <div class="call-bar">
      <button class="circ-btn btn-report" onclick="openReport()" title="通報">🚩</button>
      <button class="circ-btn btn-mic" id="micBtn" onclick="toggleMic()" title="マイク">🎙️</button>
      <button class="circ-btn btn-end" onclick="endCall()" title="終了">📵</button>
      <button class="circ-btn btn-next" onclick="nextPerson()" title="次の人">⏭️</button>
    </div>
  </div>

</div>

<!-- REPORT SHEET -->
<div class="sheet-backdrop" id="reportSheet">
  <div class="sheet">
    <div class="sheet-title">通報の理由</div>
    <button class="report-opt" onclick="submitReport('inappropriate')">🚫 不適切な行動・ヌード</button>
    <button class="report-opt" onclick="submitReport('harassment')">⚠️ ハラスメント・脅迫</button>
    <button class="report-opt" onclick="submitReport('spam')">🤖 スパム・宣伝</button>
    <button class="report-opt" onclick="submitReport('fake')">🌿 本物を持っていない</button>
    <button class="report-opt" style="color:var(--text-dim);margin-top:4px;" onclick="closeReport()">キャンセル</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── STATE ──
let peer = null;
let myStream = null;
let currentCall = null;
let currentConn = null;
let waitingConn = null;
let timerInterval = null;
let seconds = 0;
let micOn = true;
let photoTaken = false;
let verifyStream = null;
let isMatching = false;

// ── PEER ID HELPERS ──
function randId() {
  return 'hm-' + Math.random().toString(36).slice(2, 10);
}

// ── INIT PEER ──
function initPeer() {
  const id = randId();
  peer = new Peer(id, {
    debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    }
  });

  peer.on('open', () => {
    document.getElementById('peerStatus').textContent = '✓ 接続完了 (ID: ' + id.slice(0,12) + '...)';
    document.getElementById('peerStatus').className = 'status-chip ok';
    document.getElementById('onlineCount').textContent = '準備完了';
  });

  peer.on('error', (e) => {
    document.getElementById('peerStatus').textContent = '接続エラー: ' + e.type;
    document.getElementById('peerStatus').className = 'status-chip err';
    showToast('接続エラー。リロードしてください。');
  });

  // Incoming call
  peer.on('call', (call) => {
    if (!myStream) return;
    currentCall = call;
    call.answer(myStream);
    call.on('stream', (remoteStream) => {
      document.getElementById('remoteVideo').srcObject = remoteStream;
      goCall();
    });
    call.on('close', () => { handleCallEnd(); });
    call.on('error', () => { handleCallEnd(); });
  });

  // Incoming data connection (for signaling next/report)
  peer.on('connection', (conn) => {
    setupDataConn(conn);
  });
}

function setupDataConn(conn) {
  currentConn = conn;
  conn.on('data', (data) => {
    if (data === 'next') { handleCallEnd(); showToast('相手が次の人へ移動しました'); }
    if (data === 'report') { showToast('通報を受け取りました'); handleCallEnd(); }
    if (data.startsWith && data.startsWith('report:')) { showToast('通報しました'); }
  });
}

// ── SCREEN TRANSITIONS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopVerifyStream();
  photoTaken = false;
  showScreen('screen-home');
}

function goVerify() {
  showScreen('screen-verify');
  startVerifyCamera();
}

async function startVerifyCamera() {
  try {
    verifyStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    const vid = document.getElementById('verifyVideo');
    vid.srcObject = verifyStream;
    vid.style.display = 'block';
    document.getElementById('cameraPlaceholder').style.display = 'none';
  } catch(e) {
    // fallback: front camera
    try {
      verifyStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      const vid = document.getElementById('verifyVideo');
      vid.srcObject = verifyStream;
      vid.style.display = 'block';
      document.getElementById('cameraPlaceholder').style.display = 'none';
    } catch(e2) {
      showToast('カメラにアクセスできません');
    }
  }
}

function capturePhoto() {
  if (photoTaken) return;
  const vid = document.getElementById('verifyVideo');
  const canvas = document.getElementById('verifyCanvas');
  if (!verifyStream || vid.style.display === 'none') return;

  canvas.width = vid.videoWidth;
  canvas.height = vid.videoHeight;
  canvas.getContext('2d').drawImage(vid, 0, 0);
  vid.style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('retakeBtn').style.display = 'block';
  document.getElementById('proceedBtn').style.display = 'block';
  photoTaken = true;
  stopVerifyStream();
}

function retakePhoto(e) {
  e.stopPropagation();
  photoTaken = false;
  document.getElementById('verifyCanvas').style.display = 'none';
  document.getElementById('retakeBtn').style.display = 'none';
  document.getElementById('proceedBtn').style.display = 'none';
  document.getElementById('verifyVideo').style.display = 'block';
  startVerifyCamera();
}

function stopVerifyStream() {
  if (verifyStream) {
    verifyStream.getTracks().forEach(t => t.stop());
    verifyStream = null;
  }
}

// ── MATCHING ──
async function goMatch() {
  if (!photoTaken) { showToast('まず写真を撮ってください'); return; }
  // Clear canvas (no data kept)
  const canvas = document.getElementById('verifyCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

  showScreen('screen-match');
  isMatching = true;

  // Get user media for call
  try {
    myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = myStream;
  } catch(e) {
    showToast('カメラ/マイクにアクセスできません');
    goHome();
    return;
  }

  startMatchingPolling();
}

// Simple matching: store peer ID in localStorage with timestamp, check for others
// This is a basic self-hosted matching using localStorage + BroadcastChannel as relay
// For multi-device: uses PeerJS's ID exchange via a shared "room" approach
let matchPollInterval = null;

function startMatchingPolling() {
  updateMatchSub();
  // Advertise self
  const ad = { id: peer.id, ts: Date.now() };
  try { localStorage.setItem('hm_waiting', JSON.stringify(ad)); } catch(e) {}

  // Check for others (same browser tabs or localStorage)
  matchPollInterval = setInterval(checkForMatch, 1500);

  // Also listen via BroadcastChannel
  try {
    const bc = new BroadcastChannel('highme');
    bc.postMessage({ type: 'looking', id: peer.id });
    bc.onmessage = (e) => {
      if (!isMatching) return;
      if (e.data.type === 'looking' && e.data.id !== peer.id) {
        // They're looking, we call them
        bc.close();
        connectToPeer(e.data.id);
      }
      if (e.data.type === 'offer' && e.data.target === peer.id) {
        bc.close();
      }
    };
    window._bc = bc;
  } catch(e) {}
}

function checkForMatch() {
  if (!isMatching) return;
  try {
    const raw = localStorage.getItem('hm_waiting');
    if (!raw) return;
    const ad = JSON.parse(raw);
    if (ad.id === peer.id) return;
    if (Date.now() - ad.ts > 30000) { localStorage.removeItem('hm_waiting'); return; }
    // Found someone! The one with "smaller" ID initiates
    localStorage.removeItem('hm_waiting');
    if (peer.id < ad.id) {
      connectToPeer(ad.id);
    }
    // else wait for them to call us (they'll also find our ID next cycle)
  } catch(e) {}
}

function connectToPeer(targetId) {
  if (!isMatching) return;
  isMatching = false;
  clearInterval(matchPollInterval);
  if (window._bc) { try { window._bc.close(); } catch(e) {} }

  // Data channel first
  const conn = peer.connect(targetId);
  setupDataConn(conn);

  // Then call
  const call = peer.call(targetId, myStream);
  currentCall = call;
  call.on('stream', (remoteStream) => {
    document.getElementById('remoteVideo').srcObject = remoteStream;
    goCall();
  });
  call.on('close', () => handleCallEnd());
  call.on('error', () => handleCallEnd());
}

let matchDots = 0;
function updateMatchSub() {
  const msgs = [
    'ストーナーを探しています',
    '別のユーザーを待っています',
    'マッチング中...',
  ];
  let i = 0;
  const el = document.getElementById('matchSub');
  setInterval(() => {
    if (document.getElementById('screen-match').classList.contains('active')) {
      el.textContent = msgs[i % msgs.length];
      i++;
    }
  }, 2500);
}

function cancelMatch() {
  isMatching = false;
  clearInterval(matchPollInterval);
  try { localStorage.removeItem('hm_waiting'); } catch(e) {}
  if (window._bc) { try { window._bc.close(); } catch(e) {} }
  if (myStream) { myStream.getTracks().forEach(t => t.stop()); myStream = null; }
  goHome();
}

// ── CALL ──
function goCall() {
  isMatching = false;
  clearInterval(matchPollInterval);
  try { localStorage.removeItem('hm_waiting'); } catch(e) {}
  showScreen('screen-call');
  startTimer();
}

function startTimer() {
  seconds = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('callTimer').textContent = m + ':' + s;
  }, 1000);
}

function handleCallEnd() {
  clearInterval(timerInterval);
  if (currentCall) { try { currentCall.close(); } catch(e) {} currentCall = null; }
  if (myStream) { myStream.getTracks().forEach(t => t.stop()); myStream = null; }
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('localVideo').srcObject = null;
  micOn = true;
  document.getElementById('micBtn').textContent = '🎙️';
  goHome();
}

function endCall() {
  if (currentConn) { try { currentConn.send('next'); } catch(e) {} }
  handleCallEnd();
}

function nextPerson() {
  if (currentConn) { try { currentConn.send('next'); } catch(e) {} }
  if (currentCall) { try { currentCall.close(); } catch(e) {} currentCall = null; }
  clearInterval(timerInterval);
  document.getElementById('remoteVideo').srcObject = null;
  // Re-enter matching with existing stream
  isMatching = true;
  photoTaken = true;
  showScreen('screen-match');
  startMatchingPolling();
}

function toggleMic() {
  if (!myStream) return;
  micOn = !micOn;
  myStream.getAudioTracks().forEach(t => t.enabled = micOn);
  document.getElementById('micBtn').textContent = micOn ? '🎙️' : '🔇';
  document.getElementById('micBtn').style.opacity = micOn ? '1' : '0.4';
}

// ── REPORT ──
function openReport() { document.getElementById('reportSheet').classList.add('open'); }
function closeReport() { document.getElementById('reportSheet').classList.remove('open'); }

function submitReport(reason) {
  closeReport();
  if (currentConn) { try { currentConn.send('report:' + reason); } catch(e) {} }
  showToast('通報しました。次の人に移動します。');
  setTimeout(() => nextPerson(), 1200);
}

// ── TOAST ──
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── BOOT ──
initPeer();
</script>
